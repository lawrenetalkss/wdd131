<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ===== REQUIRED META TAGS ===== -->
    <!-- Meta Description - 50-160 characters -->
    <meta name="description" content="Explore a beautiful photo gallery of LDS temples from around the world, including Washington D.C., Tokyo, London, Paris, Rome, and more.">
    
    <!-- Meta Author - Student name -->
    <meta name="author" content="Lawrence Adekunle">
    
    <!-- Meta Title (already exists as <title>) -->
    <title>Temple Album - LDS Temples Photo Gallery</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    
    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Temple Album</h1>
            <button id="hamburger" aria-label="Toggle navigation menu">☰</button>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h1>LDS Temples</h1>
        
        <div class="gallery">
            <figure>
                <img src="images/washington_temple.jpg" alt="Washington D.C. Temple" loading="lazy">
                <figcaption>Washington D.C. Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/tokyo-japan-temple.jpg" alt="Tokyo Temple" loading="lazy">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/salt_lake.jpg" alt="Salt Lake Temple" loading="lazy">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/london-england-temple.jpg" alt="London Temple" loading="lazy">
                <figcaption>London England Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/paris_france.jpg" alt="Paris Temple" loading="lazy">
                <figcaption>Paris France Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/rome_italy.jpg" alt="Rome Temple" loading="lazy">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/sydney-australia-temple.jpg" alt="Sydney Temple" loading="lazy">
                <figcaption>Sydney Australia Temple</figcaption>
            </figure>
            
            <figure>
                <!-- FIXED: Removed slash and corrected filename -->
                <img src="images/johannesburg-temple.jpg" alt="Johannesburg Temple" loading="lazy">
                <figcaption>Johannesburg South Africa Temple</figcaption>
            </figure>
            
            <figure>
                <img src="images/sao_paulo.jpg" alt="Sao Paulo Temple" loading="lazy">
                <figcaption>São Paulo Brazil Temple</figcaption>
            </figure>
        </div>
    </main>
    
    <footer>
        <p>&copy; <span id="year"></span> | Lawrence Adekunle | WDD 131</p>
        <p id="lastModified">Last Modified: </p>
    </footer>
</body>
</html>
