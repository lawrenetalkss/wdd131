<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover Nigeria - a vibrant country with rich culture, diverse landscapes, and warm hospitality. Learn about Nigerian cities, weather, and attractions.">
    <meta name="author" content="Lawrence Adekunle">
    <title>Nigeria - A Place to Visit</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    
    <!-- JavaScript -->
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Nigeria</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>
    
    <main>
        <!-- Hero Section with srcset -->
        <picture class="hero">
    <source srcset="images/nigeria-hero-small.webp" media="(max-width: 600px)" type="image/webp">
    <source srcset="images/nigeria-hero-medium.webp" media="(max-width: 1024px)" type="image/webp">
    <source srcset="images/nigeria-hero-large.webp" media="(min-width: 1025px)" type="image/webp">
            <img src="images/nigeria-hero.webp" alt="Beautiful landscape of Nigeria" loading="lazy">
        </picture>
     
        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Data Section -->
            <section class="data-card">
                <h2>Data</h2>
                <div class="data-grid">
                    <div class="data-item">
                        <span class="label">Capital:</span>
                        <span class="value">Abuja</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Population:</span>
                        <span class="value">216.4 million</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Language:</span>
                        <span class="value">English</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Currency:</span>
                        <span class="value">Naira (NGN)</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Area:</span>
                        <span class="value">923,768 km²</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Region:</span>
                        <span class="value">West Africa</span>
                    </div>
                </div>
            </section>
            
            <!-- Weather Section -->
            <section class="weather-card">
                <h2>Weather <span class="weather-icon-large">⛅</span></h2>
                <div class="weather-content">
                    <div class="weather-main">
                        <img src="images/sunny-weather.svg" alt="Sunny weather" class="weather-icon-mobile" width="80" height="80">
                        <div class="weather-temp">
                            <span class="temperature">28</span>°C
                        </div>
                    </div>
                    <div class="weather-details">
                        <p><strong>Condition:</strong> Partly Cloudy</p>
                        <p><strong>Wind Speed:</strong> <span id="wind-speed">12</span> km/h</p>
                        <p><strong>Wind Chill:</strong> <span id="wind-chill">N/A</span></p>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <footer>
        <p>&copy; <span id="year"></span> | Lawrence Adekunle | Nigeria</p>
        <p id="lastModified">Last Modified: </p>
    </footer>
</body>
</html>
